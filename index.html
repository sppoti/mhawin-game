<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MHAWIN CASINO</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --tg-theme-bg-color: #1a0b2e;
      --tg-theme-text-color: #ffffff;
      --tg-theme-button-color: #ff3366;
      --tg-theme-button-text-color: #ffffff;
      --gold: #ffd700;
      --neon-green: #00ff9d;
      --sym-h: 95px;
      --reel-h: calc(var(--sym-h) * 3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
    body {
      background: radial-gradient(circle at 50% 40%, #1f0d38, #0a0510);
      color: var(--tg-theme-text-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding: 12px;
      overflow-x: hidden;
    }

    .header {
      text-align: center;
      margin-bottom: 15px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid rgba(255,215,0,0.2);
    }
    .user-info {
      display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 8px;
    }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--tg-theme-button-color));
      display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000;
    }
    .username { font-weight: 600; font-size: 1rem; }
    h1 {
      font-size: 1.6rem;
      background: linear-gradient(90deg, var(--gold), var(--tg-theme-button-color));
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin-top: 8px;
    }

    .hud {
      display: flex; justify-content: space-around; align-items: center;
      background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px; margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .hud-item { text-align: center; }
    .hud-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; }
    .hud-value { font-size: 1.3rem; font-weight: 800; color: var(--gold); text-shadow: 0 0 8px rgba(255,215,0,0.4); }

    .slot-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
      margin: 12px auto; max-width: 600px;
      background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px;
      border: 2px solid rgba(255,215,0,0.2);
    }
    .reel {
      height: var(--reel-h); background: linear-gradient(180deg, #0a0a15, #151525, #0a0a15);
      border: 2px solid rgba(255,215,0,0.3); border-radius: 8px; overflow: hidden; position: relative;
    }
    .reel::before, .reel::after {
      content: ''; position: absolute; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.1); z-index: 2;
    }
    .reel::before { top: 33.33%; }
    .reel::after { top: 66.66%; }
    .strip { display: flex; flex-direction: column; will-change: transform; }
    .sym {
      height: var(--sym-h); display: flex; flex-direction: column; justify-content: center; align-items: center;
      font-size: 0.9rem; font-weight: 800; color: #eee; border-bottom: 1px solid rgba(255,255,255,0.05);
      text-shadow: 0 2px 4px rgba(0,0,0,0.9);
    }
    .sym.rare { color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }
    .sym.win { animation: winPulse 0.5s infinite alternate; background: rgba(255,215,0,0.15); }
    @keyframes winPulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.05); }
    }

    .controls {
      display: flex; flex-direction: column; gap: 10px; margin-top: 12px;
    }
    .bet-controls {
      display: flex; justify-content: center; align-items: center; gap: 15px;
    }
    .btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; width: 40px; height: 40px; border-radius: 50%;
      font-size: 1.2rem; cursor: pointer; transition: all 0.2s;
    }
    .btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .spin-btn {
      width: 100%; padding: 16px; font-size: 1.3rem; font-weight: 800;
      background: linear-gradient(135deg, var(--tg-theme-button-color), #ff6b81);
      color: var(--tg-theme-button-text-color); border: none; border-radius: 12px;
      cursor: pointer; box-shadow: 0 4px 15px rgba(255, 51, 102, 0.4);
      transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px;
    }
    .spin-btn:active:not(:disabled) { transform: scale(0.98); }
    .spin-btn:disabled { background: #444; cursor: not-allowed; box-shadow: none; }

    .info-box {
      margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.05);
      border-radius: 8px; text-align: center; font-size: 0.95rem; min-height: 45px;
      display: flex; align-items: center; justify-content: center;
    }
    .win-text { color: var(--neon-green); font-weight: 600; }
    .lose-text { color: #ff6666; }

    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .overlay.visible { opacity: 1; pointer-events: auto; }
    .overlay-title {
      font-size: 2.5rem; font-weight: 900; letter-spacing: 3px;
      background: linear-gradient(45deg, var(--gold), #ff007a, var(--neon-green));
      background-size: 300% 300%;
      -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: gradientShift 2s ease infinite, popIn 0.5s ease;
      text-align: center;
    }
    .overlay-coins {
      margin-top: 15px; font-size: 1.8rem; color: var(--neon-green);
      font-weight: 800; animation: fadeIn 0.6s 0.3s both;
    }
    @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes popIn { 0%{transform:scale(0)} 80%{transform:scale(1.1)} 100%{transform:scale(1)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .legend {
      margin-top: 12px; font-size: 0.7rem; color: #888; text-align: center;
      background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="user-info">
      <div class="avatar" id="userAvatar">👤</div>
      <div class="username" id="userName">Игрок</div>
    </div>
    <h1>🎰 MHAWIN CASINO 🎰</h1>
  </div>

  <div class="hud">
    <div class="hud-item">
      <div class="hud-label">Баланс</div>
      <div class="hud-value" id="balance">10000</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Ставка</div>
      <div class="hud-value" id="betDisplay">50</div>
    </div>
  </div>

  <div class="slot-grid" id="slotGrid"></div>

  <div class="controls">
    <div class="bet-controls">
      <button class="btn" id="betDown">➖</button>
      <span style="font-size: 0.9rem; color: #aaa;">ИЗМЕНИТЬ СТАВКУ</span>
      <button class="btn" id="betUp">➕</button>
    </div>
    <button class="spin-btn" id="spinBtn">🐘 КРУТИТЬ</button>
  </div>

  <div class="info-box" id="infoBox">Нажмите "КРУТИТЬ" для старта</div>

  <div class="legend">
    🍒 Кадык | 𓇤 Горбунова (редкие x3) | 💩 Сын Панфилы | ᯡ Панфило<br>
    5 линий: 3 горизонтали + 2 зигзага
  </div>

  <div class="overlay" id="winOverlay">
    <div class="overlay-title">ПАНФИЛИЗАЦИЯ!</div>
    <div class="overlay-coins" id="overlayCoins">+0</div>
  </div>

  <script>
    // === TELEGRAM INTEGRATION ===
    const tg = window.Telegram.WebApp;
    tg.expand(); // Развернуть на весь экран

    // Получаем данные пользователя
    const user = tg.initDataUnsafe.user;
    if (user) {
      document.getElementById('userName').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
      if (user.photo_url) {
        document.getElementById('userAvatar').style.backgroundImage = `url(${user.photo_url})`;
        document.getElementById('userAvatar').style.backgroundSize = 'cover';
        document.getElementById('userAvatar').textContent = '';
      } else if (user.username) {
        document.getElementById('userAvatar').textContent = user.username[0].toUpperCase();
      }
    }

    // Настройка цветов под тему Telegram
    if (tg.themeParams) {
      if (tg.themeParams.bg_color) document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color);
      if (tg.themeParams.text_color) document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color);
      if (tg.themeParams.button_color) document.documentElement.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color);
      if (tg.themeParams.button_text_color) document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color);
    }

    // Готовность
    tg.ready();

    // === ИГРОВАЯ ЛОГИКА ===
    const SYMBOLS = [
      { text: "Кадык 🍒", weight: 5, cls: "rare", mult: 3 },
      { text: "Горбунова 𓇤", weight: 5, cls: "rare", mult: 3 },
      { text: "Сын Панфилы 💩", weight: 45, cls: "", mult: 1 },
      { text: "Панфило ᯡ", weight: 45, cls: "", mult: 1 }
    ];

    const PAYLINES = [
      [[0,0],[1,0],[2,0],[3,0],[4,0]],
      [[0,1],[1,1],[2,1],[3,1],[4,1]],
      [[0,2],[1,2],[2,2],[3,2],[4,2]],
      [[0,0],[1,1],[2,2],[3,1],[4,0]],
      [[0,2],[1,1],[2,0],[3,1],[4,2]]
    ];

    let balance = 10000;
    let bet = 50;
    let isSpinning = false;
    const SYM_H = 95;
    const FILL_COUNT = 24;
    const STAGGER = [1200, 1600, 2000, 2400, 2800];

    // Аудио (упрощённое)
    let audioCtx;
    function playSound() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(100, t);
      osc.frequency.linearRampToValueAtTime(200, t + 0.1);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.3);
    }

    function playWin() {
      if (!audioCtx) return;
      const t = audioCtx.currentTime;
      [523, 659, 784, 1047].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.frequency.value = f;
        g.gain.setValueAtTime(0, t + i*0.1);
        g.gain.linearRampToValueAtTime(0.15, t + i*0.1 + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, t + i*0.1 + 0.3);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t + i*0.1); o.stop(t + i*0.1 + 0.3);
      });
    }

    function weightedRandom() {
      const total = SYMBOLS.reduce((s, x) => s + x.weight, 0);
      let r = Math.random() * total;
      for (const sym of SYMBOLS) {
        r -= sym.weight;
        if (r <= 0) return {...sym};
      }
      return {...SYMBOLS[0]};
    }

    function createGrid() {
      const grid = document.getElementById('slotGrid');
      grid.innerHTML = '';
      for (let c = 0; c < 5; c++) {
        const reel = document.createElement('div');
        reel.className = 'reel';
        const strip = document.createElement('div');
        strip.className = 'strip';
        strip.id = `s${c}`;
        for (let r = 0; r < 3; r++) {
          appendSym(strip, weightedRandom());
        }
        reel.appendChild(strip);
        grid.appendChild(reel);
      }
    }

    function appendSym(strip, sym) {
      const d = document.createElement('div');
      d.className = `sym ${sym.cls}`;
      d.textContent = sym.text;
      strip.appendChild(d);
    }

    async function spin() {
      if (isSpinning || balance < bet) {
        tg.HapticFeedback.notificationOccurred('error');
        return;
      }

      isSpinning = true;
      balance -= bet;
      updateUI();
      playSound();
      tg.HapticFeedback.impactOccurred('medium');

      document.getElementById('infoBox').textContent = '🐘 Вращение...';
      document.getElementById('infoBox').className = 'info-box';
      document.getElementById('winOverlay').classList.remove('visible');

      const finalGrid = Array.from({length: 5}, () => Array.from({length: 3}, () => weightedRandom()));
      const promises = [];

      for (let c = 0; c < 5; c++) {
        const strip = document.getElementById(`s${c}`);
        strip.innerHTML = '';
        strip.style.transition = 'none';
        strip.style.transform = 'translateY(0)';
        for (let i = 0; i < FILL_COUNT; i++) appendSym(strip, weightedRandom());
        finalGrid[c].forEach(s => appendSym(strip, s));

        void strip.offsetHeight;

        setTimeout(() => {
          strip.style.transition = `transform ${STAGGER[4] - STAGGER[c] + 1000}ms cubic-bezier(0.15, 0.85, 0.35, 1)`;
          strip.style.transform = `translateY(-${FILL_COUNT * SYM_H}px)`;
        }, 30);

        promises.push(new Promise(res => {
          strip.addEventListener('transitionend', res, { once: true });
          setTimeout(res, STAGGER[c] + 1500);
        }));
      }

      await Promise.all(promises);
      isSpinning = false;
      evaluate(finalGrid);
      updateUI();
    }

    function evaluate(grid) {
      let win = 0;
      const winCoords = new Set();

      for (const line of PAYLINES) {
        const first = grid[line[0][0]][line[0][1]];
        let count = 1;
        for (let i = 1; i < 5; i++) {
          if (grid[line[i][0]][line[i][1]].text === first.text) count++;
          else break;
        }
        if (count >= 3) {
          const base = count === 3 ? 2 : count === 4 ? 8 : 40;
          win += base * bet * first.mult;
          for (let i = 0; i < count; i++) {
            winCoords.add(`${line[i][0]},${line[i][1]}`);
          }
        }
      }

      balance += win;

      if (win > 0) {
        playWin();
        tg.HapticFeedback.notificationOccurred('success');
        winCoords.forEach(key => {
          const [c, r] = key.split(',').map(Number);
          const strip = document.getElementById(`s${c}`);
          const sym = strip.children[r + FILL_COUNT];
          if (sym) sym.classList.add('win');
        });
        showOverlay(win);
        document.getElementById('infoBox').innerHTML = `🎉 ВЫИГРЫШ: <span style="color:#00ff9d">+${win}</span>`;
        document.getElementById('infoBox').className = 'info-box win-text';
      } else {
        tg.HapticFeedback.notificationOccurred('warning');
        document.getElementById('infoBox').textContent = '❌ Нет совпадений';
        document.getElementById('infoBox').className = 'info-box lose-text';
      }
    }

    function showOverlay(amount) {
      document.getElementById('overlayCoins').textContent = `+${amount}`;
      const ov = document.getElementById('winOverlay');
      ov.classList.add('visible');
      setTimeout(() => ov.classList.remove('visible'), 3000);
    }

    function updateUI() {
      document.getElementById('balance').textContent = balance;
      document.getElementById('betDisplay').textContent = bet;
      document.getElementById('spinBtn').disabled = isSpinning || balance < bet;
      document.getElementById('betDown').disabled = bet <= 10 || isSpinning;
      document.getElementById('betUp').disabled = bet >= balance || isSpinning;
    }

    // === EVENT LISTENERS ===
    document.getElementById('spinBtn').addEventListener('click', spin);
    document.getElementById('betDown').addEventListener('click', () => { if (bet > 10) bet -= 10; updateUI(); });
    document.getElementById('betUp').addEventListener('click', () => { if (bet < balance) bet += 10; updateUI(); });

    // Инициализация
    createGrid();
    updateUI();

    // Сообщаем Telegram о готовности
    setTimeout(() => {
      tg.MainButton.setText("🎰 КРУТИТЬ");
      tg.MainButton.onClick(spin);
      tg.MainButton.show();
    }, 500);
  </script>
</body>
</html>
